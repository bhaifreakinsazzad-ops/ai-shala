services:
  - type: web
    name: yusra-synthetic-intelligence
    env: node
    region: singapore
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      # SUPABASE_URL is the public project URL (sent to browsers anyway, not a secret).
      # Baked in as a value so it can't be set wrong — a wrong-but-valid URL boots the
      # server then fails on the first DB call with a column-not-found error (see HANDOVER §9).
      - key: SUPABASE_URL
        value: https://zjpnehwcpfcpmlcthnld.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: LLM7_API_KEY
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://meet-yusra.online
      - key: RENDER_EXTERNAL_URL
        value: https://yusra-synthetic-intelligence.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://meet-yusra.online,https://www.meet-yusra.online,https://yusra-synthetic-intelligence.onrender.com
      - key: PAYMENT_PHONE
        value: "01778307704"
      - key: ADMIN_EMAILS
        value: agenthamoodi@gmail.com
      - key: FREE_TRIAL_DAYS
        value: "7"
      - key: FREE_DAILY_LIMIT
        value: "50"
      - key: FREE_IMAGE_DAILY_LIMIT
        value: "5"
      - key: FREE_FUSION_DAILY_LIMIT
        value: "3"
