services:
  - type: web
    name: yusra-synthetic-intelligence
    env: node
    region: singapore
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: LLM7_API_KEY
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PAYMENT_PHONE
        value: "01778307704"
      - key: ADMIN_EMAILS
        value: agenthamoodi@gmail.com
      - key: FREE_TRIAL_DAYS
        value: "7"
      - key: FREE_DAILY_LIMIT
        value: "50"
      - key: FREE_IMAGE_DAILY_LIMIT
        value: "5"
      - key: FREE_FUSION_DAILY_LIMIT
        value: "3"
